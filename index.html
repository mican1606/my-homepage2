<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教員向け 学習指導要領（論点整理）キーワード確認クイズ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.3;
      margin: 0 0 8px;
    }
    p { margin: 0; color: #475569; }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-top: 24px;
      overflow: hidden;
    }
    .card-inner { padding: 24px; }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .badge {
      display: inline-block;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 700;
      color: #334155;
    }
    .stats {
      display: flex;
      gap: 16px;
      color: #475569;
      font-size: 14px;
      flex-wrap: wrap;
    }
    .progress {
      height: 10px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-bar {
      height: 100%;
      background: #0f172a;
      width: 0%;
      transition: width .25s ease;
    }
    .question-box {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 20px;
    }
    .question-id {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .question {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 800;
      margin: 0;
      color: #0f172a;
    }
    .choices {
      display: grid;
      gap: 12px;
    }
    button {
      font: inherit;
      cursor: pointer;
    }
    .choice-btn {
      width: 100%;
      border: 1px solid #cbd5e1;
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      text-align: left;
      font-weight: 700;
      transition: .15s ease;
    }
    .choice-btn:hover:not(:disabled) {
      background: #f1f5f9;
      transform: translateY(-1px);
    }
    .choice-btn:disabled {
      cursor: default;
      opacity: 1;
    }
    .choice-btn.correct {
      border-color: #16a34a;
      background: #dcfce7;
    }
    .choice-btn.incorrect {
      border-color: #dc2626;
      background: #fee2e2;
    }
    .feedback {
      margin-top: 20px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-weight: 700;
    }
    .next-btn, .restart-btn {
      border: 0;
      background: #0f172a;
      color: #fff;
      border-radius: 16px;
      padding: 12px 18px;
      font-weight: 800;
    }
    .restart-btn {
      margin-top: 12px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }
    .result-item {
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 20px;
      background: #fff;
    }
    .result-label {
      color: #64748b;
      font-size: 14px;
    }
    .result-value {
      font-size: 34px;
      font-weight: 900;
      margin-top: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 680px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f1f5f9; }
    .table-wrap { overflow-x: auto; }
    .hidden { display: none; }
    @media (max-width: 700px) {
      .container { padding: 16px; }
      .card-inner { padding: 18px; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section id="quiz-screen">
      <h1>中学校教員向け 論点整理キーワード確認テスト</h1>
      <p>問題ストック31問からランダムに10問を出題。選択肢も毎回ランダム表示されます。</p>

      <div class="card">
        <div class="card-inner">
          <div class="top-row">
            <span class="badge" id="question-count">1 / 10</span>
            <div class="stats">
              <span>正解数：<strong id="correct-count">0</strong></span>
              <span>正答率：<strong id="accuracy">0%</strong></span>
            </div>
          </div>

          <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
          </div>

          <div class="question-box">
            <div class="question-id" id="question-id"></div>
            <h2 class="question" id="question-text"></h2>
          </div>

          <div class="choices" id="choices"></div>

          <div class="feedback hidden" id="feedback">
            <div id="feedback-text"></div>
            <button class="next-btn" id="next-btn">次の問題へ</button>
          </div>
        </div>
      </div>
    </section>

    <section id="result-screen" class="hidden">
      <div class="card">
        <div class="card-inner">
          <div class="top-row">
            <div>
              <h1>論点整理キーワード確認テスト 結果</h1>
              <p>31問の問題ストックからランダムに10問を出題しました。</p>
            </div>
            <button class="restart-btn" id="restart-btn">もう一度出題</button>
          </div>

          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">正答数</div>
              <div class="result-value" id="result-correct">0 / 10</div>
            </div>
            <div class="result-item">
              <div class="result-label">正答率</div>
              <div class="result-value" id="result-accuracy">0%</div>
            </div>
            <div class="result-item">
              <div class="result-label">平均解答時間</div>
              <div class="result-value" id="result-avg">0秒</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-inner">
          <h2>解答ログ</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>問題ID</th>
                  <th>正答用語</th>
                  <th>あなたの解答</th>
                  <th>正誤</th>
                  <th>解答時間</th>
                </tr>
              </thead>
              <tbody id="answer-log"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const QUESTION_BANK = [
      { id: "Q001", term: "主体的・対話的で深い学び", clue: "生徒が自ら学びに向かい、他者との対話を通して考えを広げ、知識を関連付けて理解を深める授業改善の視点", choices: ["主体的・対話的で深い学び", "調整授業時数制度", "二階だての教育課程", "学習評価"] },
      { id: "Q002", term: "主体的・対話的で深い学び", clue: "教師による一方的な説明にとどまらず、生徒が課題に向き合い、対話しながら学びの質を高めること", choices: ["主体的・対話的で深い学び", "カリキュラム・マネジメント", "裁量的な時間", "ウェルビーイング"] },
      { id: "Q003", term: "情報活用能力", clue: "情報を収集・整理・分析・発信し、デジタル社会に主体的に関わるための基盤となる資質・能力", choices: ["情報活用能力", "心理的安全性", "総合的な理解", "社会に開かれた教育課程"] },
      { id: "Q004", term: "情報活用能力", clue: "探究的な学びを支える基盤として、ICTや情報を適切に扱う力", choices: ["情報活用能力", "協働的な学び", "エージェンシー", "統合的な理解"] },
      { id: "Q005", term: "学びに向かう力、人間性等", clue: "知識及び技能、思考力・判断力・表現力等を、どのような方向で働かせるかに関わる資質・能力", choices: ["学びに向かう力、人間性等", "深い学び", "調整授業時数制度", "デジタル学習基盤"] },
      { id: "Q006", term: "学びに向かう力、人間性等", clue: "主体的に学習に取り組む態度、自己調整、協働する力、感性や思いやりなどを含む広い資質・能力", choices: ["学びに向かう力、人間性等", "二階だての教育課程", "学習評価", "裁量的な時間"] },
      { id: "Q007", term: "個別最適な学び", clue: "一人一人の特性、興味・関心、学習進度等に応じて学習内容や方法を調整する学び", choices: ["個別最適な学び", "協働的な学び", "主体的・対話的で深い学び", "総合的な理解"] },
      { id: "Q008", term: "個別最適な学び", clue: "生徒の実態に応じて、指導の個別化や学習の個性化を図る考え方", choices: ["個別最適な学び", "心理的安全性", "情報活用能力", "教科の見方・考え方"] },
      { id: "Q009", term: "協働的な学び", clue: "多様な他者と関わり、対話や協力を通して考えを広げ深める学び", choices: ["協働的な学び", "個別最適な学び", "裁量的な時間", "深い学び"] },
      { id: "Q010", term: "協働的な学び", clue: "一人では得にくい視点を、友人や地域の人などとの関わりから得て学びを深めること", choices: ["協働的な学び", "二階だての教育課程", "学習評価", "デジタル学習基盤"] },
      { id: "Q011", term: "二階だての教育課程", clue: "共通的に身に付ける内容を土台にしつつ、各学校や生徒の実態に応じた柔軟な学びを重ねる教育課程の考え方", choices: ["二階だての教育課程", "心理的安全性", "情報活用能力", "総合的な理解"] },
      { id: "Q012", term: "探究的な学び", clue: "課題の設定、情報の収集、整理・分析、まとめ・表現を通して学ぶ過程", choices: ["探究的な学び", "学習評価", "ウェルビーイング", "統合的な理解"] },
      { id: "Q013", term: "探究的な学び", clue: "生徒が問いをもち、調べ、考え、表現する過程を通して課題解決に向かう学び", choices: ["探究的な学び", "調整授業時数制度", "教科の見方・考え方", "裁量的な時間"] },
      { id: "Q014", term: "多様性の包摂", clue: "多様な個性・特性・背景をもつ子供を教育課程全体で受け止め、一人一人の可能性を開く考え方", choices: ["多様性の包摂", "深い学び", "カリキュラム・マネジメント", "情報活用能力"] },
      { id: "Q015", term: "多様性の包摂", clue: "不登校、障害、外国につながる背景、特異な才能などを含む多様な実態に応じて学びを保障する方向性", choices: ["多様性の包摂", "協働的な学び", "学習評価", "社会に開かれた教育課程"] },
      { id: "Q016", term: "裁量的な時間", clue: "各学校が児童生徒や地域の実態に応じて工夫して活用できる柔軟な時間", choices: ["裁量的な時間", "ウェルビーイング", "深い学び", "心理的安全性"] },
      { id: "Q017", term: "裁量的な時間", clue: "子供の興味・関心や学校の課題に応じて、教育課程に柔軟性と余白をもたらす時間", choices: ["裁量的な時間", "情報活用能力", "総合的な理解", "民主的で持続可能な社会の創り手"] },
      { id: "Q018", term: "調整授業時数制度", clue: "標準授業時数を踏まえつつ、学校の実態に応じて授業時数の配分を柔軟に調整する制度", choices: ["調整授業時数制度", "二階だての教育課程", "協働的な学び", "エージェンシー"] },
      { id: "Q019", term: "社会に開かれた教育課程", clue: "学校教育を社会と共有し、よりよい社会づくりと結び付けながら教育課程を編成する理念", choices: ["社会に開かれた教育課程", "学習評価", "探究的な学び", "心理的安全性"] },
      { id: "Q020", term: "ウェルビーイング", clue: "個人と社会がよりよくある状態を目指す考え方", choices: ["ウェルビーイング", "カリキュラム・マネジメント", "情報活用能力", "深い学び"] },
      { id: "Q021", term: "エージェンシー", clue: "自分の人生や社会に主体的に関わり、よりよい変化を起こしていく力や姿勢", choices: ["エージェンシー", "統合的な理解", "調整授業時数制度", "協働的な学び"] },
      { id: "Q022", term: "カリキュラム・マネジメント", clue: "教育課程を編成・実施・評価・改善し、学校全体で教育活動の質を高める営み", choices: ["カリキュラム・マネジメント", "心理的安全性", "個別最適な学び", "情報活用能力"] },
      { id: "Q023", term: "深い学び", clue: "知識を相互に関連付けて理解し、他の学習や生活の場面でも活用できるようにする学び", choices: ["深い学び", "裁量的な時間", "二階だての教育課程", "ウェルビーイング"] },
      { id: "Q024", term: "深い学び", clue: "単なる暗記ではなく、概念として理解し、未知の状況にも活用できるようにする学び", choices: ["深い学び", "学習評価", "協働的な学び", "社会に開かれた教育課程"] },
      { id: "Q025", term: "デジタル学習基盤", clue: "ICT端末、ネットワーク、デジタル教材など、学びを支えるデジタル環境の総称", choices: ["デジタル学習基盤", "情報活用能力", "心理的安全性", "総合的な理解"] },
      { id: "Q026", term: "心理的安全性", clue: "生徒が安心して意見を述べたり、失敗を恐れず挑戦したりできる学習環境", choices: ["心理的安全性", "学習評価", "エージェンシー", "調整授業時数制度"] },
      { id: "Q027", term: "民主的で持続可能な社会の創り手", clue: "多様な他者と協働し、自らの人生を舵取りしながら、よりよい社会をつくる主体", choices: ["民主的で持続可能な社会の創り手", "個別最適な学び", "裁量的な時間", "統合的な理解"] },
      { id: "Q028", term: "学習評価", clue: "生徒の学習状況を把握し、指導改善や学習改善につなげる営み", choices: ["学習評価", "深い学び", "二階だての教育課程", "情報活用能力"] },
      { id: "Q029", term: "統合的な理解", clue: "複数の知識や技能を結び付け、まとまりのある概念として捉える理解", choices: ["統合的な理解", "総合的な理解", "裁量的な時間", "心理的安全性"] },
      { id: "Q030", term: "総合的な理解", clue: "個別の事柄を幅広く関連付け、全体として捉える理解", choices: ["総合的な理解", "統合的な理解", "エージェンシー", "協働的な学び"] },
      { id: "Q031", term: "教科の見方・考え方", clue: "各教科等ならではの対象の捉え方や思考の枠組みで、学習を深める際に働くもの", choices: ["教科の見方・考え方", "学習評価", "ウェルビーイング", "二階だての教育課程"] }
    ];

    let questions = [];
    let current = 0;
    let answers = [];
    let selected = "";
    let questionStart = Date.now();

    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionCount = document.getElementById("question-count");
    const correctCount = document.getElementById("correct-count");
    const accuracy = document.getElementById("accuracy");
    const progressBar = document.getElementById("progress-bar");
    const questionId = document.getElementById("question-id");
    const questionText = document.getElementById("question-text");
    const choicesEl = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const feedbackText = document.getElementById("feedback-text");
    const nextBtn = document.getElementById("next-btn");
    const restartBtn = document.getElementById("restart-btn");

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function prepareQuiz() {
      return shuffle(QUESTION_BANK)
        .slice(0, 10)
        .map(q => ({ ...q, shuffledChoices: shuffle(q.choices) }));
    }

    function startQuiz() {
      questions = prepareQuiz();
      current = 0;
      answers = [];
      selected = "";
      questionStart = Date.now();
      quizScreen.classList.remove("hidden");
      resultScreen.classList.add("hidden");
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[current];
      const correct = answers.filter(a => a.correct).length;
      const percent = answers.length ? Math.round((correct / answers.length) * 100) : 0;

      questionCount.textContent = `${current + 1} / 10`;
      correctCount.textContent = correct;
      accuracy.textContent = `${percent}%`;
      progressBar.style.width = `${((current + 1) / 10) * 100}%`;
      questionId.textContent = q.id;
      questionText.textContent = `「${q.clue}」に最も近い用語はどれか？`;

      choicesEl.innerHTML = "";
      feedback.classList.add("hidden");
      selected = "";

      q.shuffledChoices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.addEventListener("click", () => answerQuestion(choice));
        choicesEl.appendChild(btn);
      });
    }

    function answerQuestion(choice) {
      if (selected) return;
      selected = choice;

      const q = questions[current];
      const elapsed = Math.round((Date.now() - questionStart) / 1000);
      const correct = choice === q.term;

      answers.push({
        id: q.id,
        term: q.term,
        choice,
        correct,
        seconds: elapsed
      });

      document.querySelectorAll(".choice-btn").forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === q.term) btn.classList.add("correct");
        if (btn.textContent === choice && !correct) btn.classList.add("incorrect");
      });

      feedbackText.textContent = correct ? "○ 正解です。" : `× 不正解です。正答は「${q.term}」です。`;
      nextBtn.textContent = current + 1 === 10 ? "結果を見る" : "次の問題へ";
      feedback.classList.remove("hidden");

      const correctNow = answers.filter(a => a.correct).length;
      correctCount.textContent = correctNow;
      accuracy.textContent = `${Math.round((correctNow / answers.length) * 100)}%`;
    }

    function showResults() {
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const correct = answers.filter(a => a.correct).length;
      const avg = answers.length
        ? Math.round(answers.reduce((sum, a) => sum + a.seconds, 0) / answers.length)
        : 0;

      document.getElementById("result-correct").textContent = `${correct} / 10`;
      document.getElementById("result-accuracy").textContent = `${Math.round((correct / 10) * 100)}%`;
      document.getElementById("result-avg").textContent = `${avg}秒`;

      const log = document.getElementById("answer-log");
      log.innerHTML = "";
      answers.forEach(a => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${a.id}</td>
          <td>${a.term}</td>
          <td>${a.choice}</td>
          <td>${a.correct ? "○" : "×"}</td>
          <td>${a.seconds}秒</td>
        `;
        log.appendChild(tr);
      });
    }

    nextBtn.addEventListener("click", () => {
      if (current + 1 >= questions.length) {
        showResults();
      } else {
        current++;
        questionStart = Date.now();
        renderQuestion();
      }
    });

    restartBtn.addEventListener("click", startQuiz);

    startQuiz();
  </script>
</body>
</html>
